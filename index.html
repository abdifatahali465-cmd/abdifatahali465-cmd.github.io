<!DOCTYPE html>
<html>
<head>
<title>ABDIFATAH PORFOLIO</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: arial, sans-serif;
        background-color: #f0f0f0;
    }
    header {
        background-color: #2c3e50;
        color: white; 
        text-align: center;
        padding: 40px;
    }

    /* ANIMATION */
    @keyframes fadein {
        from {opacity: 0;}
        to   {opacity: 1;}
    }
    @keyframes slidein {
        from {
            transform: translateX(-100px);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    header {
        animation: slidein 1s ease-out;
    }
    .section {
        animation: fadein 2s ease-in;
    }
    .SKILLS {
        animation: fadein 3s ease-in;
    }
    header h1 {
        font-size: 40px;
    }
    header p {
        font-size: 18px;
        color: #f39c12;
    }
    .section {
        padding: 30px;
        max-width: 800px;
        margin: 20px auto;
        background: white
    }
    .section h2 {
        color: #2c3e50;
        margin-bottom: 15px;
    }
    .skills {
        display: flex;
        gap: 15px;
    }
    .skills {
        background-color: #f39c12;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 16px;
    }
    footer{
        background-color: #2c3e50;
        color: white;
        text-align: center;
        padding: 20px;
        margin-top: 30px;
    }

    /* DARK MADE */
    body.dark {
        background-color: #1a1a2e;
        color: white;
    }
    body.dark header {
        background-color: #16213e;
    }
    body.dark .section {
        background-color: #0f3460;
        color: white;
    }
    body.dark footer {
        background-color: #16213e;
    }

    /* Dark Mode Button */
    .dark-btn {
        position: fixed;
        top: 10px;
        right: 10px;
        background: #f39c12;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 20px;
        z-index: 999;
    }
</style>
</head>
<body>
    <button class="dark-btn" onclick="darkMode()">🌜</button>
   <!-- NAVIGATION BAR -->
     <nav style="background: #f39c12; padding: 15PX; text-align: center;">
        <a href="#about" style="color: white; margin: 15px;">ABOUT</a>
        <a href="#skills" style="color: white; margin: 15px;">SKILLS</a>
        <a href="#Contacts" style="color: white; margin: 15px;">CONTACT</a>
     </nav>

    <!-- HEADER -->
     <header>
        <h1>ABDIFATAH AHMED ALI</h1>
        <P>Web Developer| Somalia</P>
     </header>
     <!-- ABOUT -->
      <div class="section" id="about">
        <h2>my skills</h2>
        <div class="skills">
            <div class="skills">HTML</div>
            <div class="skills">CSS</div>
            <div class="skills">JAVASCRIPT</div>
        </div>
      </div>

      <!-- CONTACT -->
       <div class="section" id="contact">
        <H2>CONTACT ME</H2>
        <P>Email: abdifatahali465@gmail.com</P>
        <p>Phone: +252619847049</p>
       </div>

       <!-- FOOTER -->
        <footer>
            <P>© 2026 ABDIFATAH AHMED ALI</P>
        </footer>

        <!-- CONTACT FROM -->
         <div class="section">
            <h2>SEND MESSAGE</h2>
            <label>YOUR NAME</label>
            <input type="TEXT"
            placeholder="ENTER YOUR NAME"
            style="width: 100%; padding: 10px; margin: 8px 0;
            border: 1px solid #ccc; border-radius: 5px;
            font-size: 16px;">
            <label>EMAIL</label>
            <input type="email"
            placeholder="email@example.com"
            style="width: 100px; padding: 10px; margin: 8px 0;
            border: 1px solid #ccc; border-radius: 5px; 
            font-size: 16px;">
            <label>ENTER YOUR MESSAGE</label><br>
            <textarea placeholder="WRITE YOUR MESSAGE HERE..."
            style="width: 100; padding: 10px; margin: 8PX 0;
            border: 1px solid #ccc; border-radius: 5PX;
            font-size: 16px; height: 120px;"></textarea>
            <button onclick="SENDMESSAGE()"
            style="background: #f39c12; color: white;
            padding: 12px 30px; border: none;
            border-radius: 8px; font-size: 18px;
            cursor: pointer;">
            SEND MESSAGE
            </button>   
         </div>
         <script>
            function SENDMESSAGE() {
                alert("your message has ben received!Thank you!");
            }
            function darkMode() {
                document.body.classList.toggle("dark");
                let btn = document.querySelector(".dark-btn")
                if (document.body.classList.contains("dark")) {
                    btn.innerHTML = "🔆";
                } else {
                    btn.innerHTML = "🌜";
                }
            }
         </script>
</body> 
</html>
